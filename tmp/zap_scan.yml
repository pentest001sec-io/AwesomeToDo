env:
  contexts:
  - name: http://localhost:8000
    urls:
    - http://localhost:8000
    includePaths:
    - http://localhost:8000.*
    excludePaths:
    - http://localhost:8000/js.*
    - http://localhost:8000/style.css
    - http://localhost:8000/favicon.ico
    authentication:
      verification:
        method: response
        pollFrequency: 60
        pollUnits: requests
        pollUrl: ""
        pollPostData: ""
    sessionManagement:
      method: cookie
    technology: {}
    structure: {}
  parameters: {}
jobs:
- type: passiveScan-config
  parameters: {}
- type: import
  parameters:
    type: har
    fileName: "/zap/wrk/tmp/AwesomeToDo.har"
- type: passiveScan-wait
  parameters: {}
- type: activeScan
  parameters:
    context: http://localhost:8000
  policyDefinition:
    defaultStrength: low
    defaultThreshold: low
- type: report
  parameters:
    theme: original
    reportDir: /zap/wrk
    reportFile: zap_report.html
    reportTitle: ZAP Scanning Report
  risks:
  - low
  - medium
  - high
  confidences:
  - low
  - medium
  - high
  - confirmed
  sections:
  - siteRiskCounts
  - responseBody
  - appendix
  - alertTypes
  - responseHeader
  - alertTypeCounts
  - riskConfidenceCounts
  - alerts
  - aboutThisReport
  - contents
  - requestBody
  - reportDescription
  - reportParameters
  - requestHeader
  - summaries

